name: Scrape Tweets and Replies

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scrape tweets and replies
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
        run: node scripts/scrape-tweets.js

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          
          git rm -rf . 2>/dev/null || true
          git checkout main -- index.html manifest.json sw.js 2>/dev/null || true
          
          git add index.html manifest.json sw.js
          git commit -m "Update: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" || echo "No changes"
          git push -f origin gh-pages
